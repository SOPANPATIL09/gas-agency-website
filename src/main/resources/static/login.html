<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Sudip HP Gas Agency</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}
body {
    animation: zoomBg 20s infinite alternate;
}

@keyframes zoomBg {
    from { background-size: 100%; }
    to { background-size: 110%; }
}

body {
    height: 100vh;
    background: url('images/bg.png') no-repeat center center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;

    /* ✅ ADD THIS */
    animation: zoomBg 20s infinite alternate;
}

/* Premium overlay (gradient + light blur) */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    
    /* 👇 better than plain dark */
    background: linear-gradient(
        rgba(0, 0, 0, 0.4),
        rgba(0, 0, 0, 0.6)
    );

    /* 👇 softer blur */
    backdrop-filter: blur(2px);

    top: 0;
    left: 0;
}

/* Login Card */
.login-box {
    position: relative;
    width: 350px;
    padding: 30px;
    background: rgba(255,255,255,0.95); /* ✅ updated */
    backdrop-filter: blur(10px);        /* ✅ new */
    border-radius: 14px;
    text-align: center;
    z-index: 1;
    box-shadow: 0 15px 50px rgba(0,0,0,0.5);
}
@keyframes zoomBg {
    from { background-size: 100%; }
    to { background-size: 110%; }
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Logo */
.logo {
    width: 70px;
    margin-bottom: 10px;
}

/* Title */
.login-box h2 {
    margin-bottom: 20px;
    color: #333;
}

/* Inputs */
.input-box {
    position: relative;
}

.input-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
    transition: 0.2s;
}

.input-box input:focus {
    border-color: red;
    box-shadow: 0 0 5px rgba(255,0,0,0.3);
}

/* Eye icon */
.eye {
    position: absolute;
    right: 15px;
    top: 18px;
    cursor: pointer;
    font-size: 14px;
}

/* Remember */
.remember {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
    margin-top: 5px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: linear-gradient(45deg, #ff0000, #ff4d4d);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* Spinner */
.spinner {
    display: none;
    margin: 15px auto;
    border: 4px solid #f3f3f3;
    border-top: 4px solid red;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="login-box">

    <!-- LOGO -->
    <img src="images/logo.png" class="logo">

    <h2>Admin Login</h2>

    <!-- Username -->
    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>

    <!-- Password -->
    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
        <span class="eye" onclick="togglePassword()">👁</span>
    </div>

    <!-- Remember -->
    <div class="remember">
        <label><input type="checkbox" id="remember"> Remember Me</label>
    </div>

    <!-- Button -->
    <button id="loginBtn" onclick="login()">Login</button>

    <!-- Spinner -->
    <div class="spinner" id="loader"></div>

    <div class="footer">Sudip HP Gas Agency</div>

</div>

<script>

/* 👁 Show / Hide Password */
function togglePassword(){
    let pass = document.getElementById("password");

    if(pass.type === "password"){
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}

/* 🔐 Login Function */
function login(){

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let loader = document.getElementById("loader");
    let btn = document.getElementById("loginBtn");

    // ✅ Validation
    if(!username || !password){
        alert("Please fill all fields ❌");
        return;
    }

    loader.style.display = "block";
    btn.disabled = true;

    fetch("http://localhost:8080/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => {

        loader.style.display = "none";
        btn.disabled = false;

        if(res.status === 200) return res.text();
        if(res.status === 400) throw new Error("Missing fields");
        if(res.status === 401) throw new Error("Invalid Username or Password");

        throw new Error("Server Error");
    })
    .then(() => {

        // ✅ Remember Me
        if(document.getElementById("remember").checked){
            localStorage.setItem("login", "true");
        } else {
            sessionStorage.setItem("login", "true");
        }

        window.location.href = "admin.html";
    })
    .catch(err => {
        alert(err.message + " ❌");
    });
}

/* ⌨️ Enter Key Login */
document.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        login();
    }
});

/* 🔁 Auto Login */
window.onload = function(){
    if(localStorage.getItem("login") === "true"){
        window.location.href = "admin.html";
    }
}

</script>

</body>
</html>
