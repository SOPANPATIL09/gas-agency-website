<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Sudip HP Gas Agency</title>
<style>
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url('images/bg.png') no-repeat center center / cover;
  animation: zoomBg 20s ease-in-out infinite alternate;
  position: relative;
}

@keyframes zoomBg {
  from { background-size: 100%; }
  to   { background-size: 112%; }
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, rgba(5,20,60,0.55), rgba(0,0,0,0.65));
  backdrop-filter: blur(3px);
}

/* ── CARD ── */
.login-box {
  position: relative;
  z-index: 1;
  width: 370px;
  padding: 36px 32px 28px;
  background: rgba(255,255,255,0.97);
  border-radius: 18px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── LOGO ── */
.logo {
  width: 72px;
  margin-bottom: 12px;
  border-radius: 50%;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

.login-box h2 {
  font-size: 22px;
  font-weight: 700;
  color: #1a2e5a;
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}

.login-box .subtitle {
  font-size: 12px;
  color: #8a9bb5;
  margin-bottom: 24px;
}

/* ── INPUT GROUP ── */
.input-group {
  position: relative;
  margin-bottom: 14px;
  text-align: left;
}

.input-group input {
  width: 100%;
  padding: 13px 16px;
  padding-right: 44px;
  border: 1.5px solid #dde3ef;
  border-radius: 10px;
  font-size: 15px;
  color: #1a2e5a;
  background: #f7f9fc;
  outline: none;
  transition: all 0.2s;
}

.input-group input::placeholder { color: #aab4c8; }

.input-group input:focus {
  border-color: #1565c0;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
}

.input-group input.error {
  border-color: #e53935;
  background: #fff8f8;
  box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
}

.eye-btn {
  position: absolute;
  right: 13px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 16px;
  user-select: none;
  color: #8a9bb5;
  transition: color 0.2s;
}

.eye-btn:hover { color: #1565c0; }

/* ── ERROR MESSAGE ── */
.error-msg {
  display: none;
  background: #fff3f3;
  border: 1px solid #ffcdd2;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #c62828;
  font-weight: 500;
  margin-bottom: 14px;
  text-align: left;
  animation: shake 0.4s ease;
}

.error-msg.show { display: flex; align-items: center; gap: 8px; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60%  { transform: translateX(-6px); }
  40%,80%  { transform: translateX(6px); }
}

/* ── REMEMBER ── */
.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #5a6a85;
  margin-bottom: 18px;
  cursor: pointer;
  user-select: none;
}

.remember input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: #1565c0;
  cursor: pointer;
}

/* ── LOGIN BUTTON ── */
.login-btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #1565c0, #0d47a1);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: 0.3px;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(13,71,161,0.35);
}

.login-btn:active { transform: translateY(0); }

.login-btn:disabled {
  opacity: 0.65;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ── SPINNER (inside button) ── */
.spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── SUCCESS STATE ── */
.login-btn.success {
  background: linear-gradient(135deg, #2e7d32, #1b5e20);
}

/* ── FOOTER ── */
.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aab4c8;
}

.footer span {
  color: #1565c0;
  font-weight: 600;
}
</style>
</head>
<body>

<div class="login-box">

  <img src="images/logo.png" class="logo" alt="Logo">

  <h2>Admin Login</h2>
  <p class="subtitle">Sudip HP Gas Agency Portal</p>

  <!-- ERROR MESSAGE -->
  <div class="error-msg" id="errorMsg">
    <span>⚠️</span>
    <span id="errorText">Invalid credentials</span>
  </div>

  <!-- USERNAME -->
  <div class="input-group">
    <input type="text" id="username" placeholder="Username" autocomplete="username">
  </div>

  <!-- PASSWORD -->
  <div class="input-group">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <span class="eye-btn" id="eyeBtn" onclick="togglePassword()">👁️</span>
  </div>

  <!-- REMEMBER ME -->
  <label class="remember">
    <input type="checkbox" id="remember">
    Remember me on this device
  </label>

  <!-- LOGIN BUTTON -->
  <button class="login-btn" id="loginBtn" onclick="login()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">Login</span>
  </button>

  <div class="footer">© 2026 <span>Sudip HP Gas Agency</span></div>

</div>

<script>
const API = "https://gas-agency-website-1.onrender.com";

// ── AUTO LOGIN ──
window.onload = function () {
  if (localStorage.getItem("login") === "true") {
    window.location.href = "admin.html";
  }
};

// ── TOGGLE PASSWORD ──
function togglePassword() {
  const pass = document.getElementById("password");
  const eye  = document.getElementById("eyeBtn");
  if (pass.type === "password") {
    pass.type = "text";
    eye.textContent = "🙈";
  } else {
    pass.type = "password";
    eye.textContent = "👁️";
  }
}

// ── SHOW ERROR ──
function showError(msg) {
  const box = document.getElementById("errorMsg");
  document.getElementById("errorText").textContent = msg;
  box.classList.remove("show");
  void box.offsetWidth; // restart animation
  box.classList.add("show");

  document.getElementById("username").classList.add("error");
  document.getElementById("password").classList.add("error");
}

function clearError() {
  document.getElementById("errorMsg").classList.remove("show");
  document.getElementById("username").classList.remove("error");
  document.getElementById("password").classList.remove("error");
}

// ── LOGIN ──
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn      = document.getElementById("loginBtn");
  const spinner  = document.getElementById("spinner");
  const btnText  = document.getElementById("btnText");

  clearError();

  if (!username || !password) {
    showError("Please enter your username and password.");
    return;
  }

  // Loading state
  btn.disabled = true;
  spinner.style.display = "block";
  btnText.textContent = "Logging in...";

  try {
    const res = await fetch(`${API}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    if (res.status === 200) {
      // Success state
      btn.classList.add("success");
      btnText.textContent = "✓ Success!";
      spinner.style.display = "none";

      if (document.getElementById("remember").checked) {
        localStorage.setItem("login", "true");
      } else {
        sessionStorage.setItem("login", "true");
      }

      setTimeout(() => { window.location.href = "admin.html"; }, 600);

    } else if (res.status === 401) {
      showError("Invalid username or password. Try again.");
      resetBtn();
    } else if (res.status === 400) {
      showError("Please fill in all required fields.");
      resetBtn();
    } else {
      showError("Server error. Please try again later.");
      resetBtn();
    }

  } catch (err) {
    showError("Cannot connect to server. Check your internet.");
    resetBtn();
  }
}

function resetBtn() {
  const btn     = document.getElementById("loginBtn");
  const spinner = document.getElementById("spinner");
  const btnText = document.getElementById("btnText");
  btn.disabled = false;
  btn.classList.remove("success");
  spinner.style.display = "none";
  btnText.textContent = "Login";
}

// ── ENTER KEY ──
document.addEventListener("keydown", function (e) {
  if (e.key === "Enter") login();
});

// ── CLEAR ERROR ON TYPING ──
["username", "password"].forEach(id => {
  document.getElementById(id).addEventListener("input", clearError);
});
</script>
</body>
</html>
